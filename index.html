
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>0000</title>

    <!-- Style -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- LOGIN -->
    <div id="login">
        <h2>Accès</h2>
        <input type="password" id="password" placeholder="Mot de passe" />
        <button onclick="login()">Entrer</button>
    </div>

    <!-- CHAT -->
    <div id="chatApp">
        <div id="chatControls">
            <button onclick="clearChat()" class="danger">Vider le chat</button>
        </div>

        <div id="chat"></div>

        <div id="inputArea">
            <textarea id="messageInput" placeholder="Écrire un message..." rows="1"></textarea>

            <!-- Bouton appareil photo -->
            <button id="cameraButton" type="button">📷</button>
            <input type="file" id="imageInput" accept="image/*" capture="environment" style="display:none">

            <!-- Bouton envoyer -->
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <!-- ✅ CHARGER SUPABASE JS EN PREMIER -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ✅ PUIS TON SCRIPT QUI UTILISE SUPABASE -->
    <script src="script.js"></script>

</body>
</html>
