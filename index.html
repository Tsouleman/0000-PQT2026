<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat privé</title>
  style.css
</head>
<body>

  <!-- LOGIN -->
  <div id="login">
    <h2>Accès au chat</h2>
    <input id="displayName" type="text" placeholder="Votre nom" autocomplete="name" />
    <input id="accessCode" type="password" placeholder="Votre code personnel" autocomplete="one-time-code" />
    <button id="loginBtn">Entrer</button>
    <div id="loginError" aria-live="polite"></div>
  </div>

  <!-- CHAT -->
  <div id="chatApp">
    <div id="topBar">
      <div class="topLeft">
        <div id="peerName">…</div>
        <div id="peerStatus">…</div>
      </div>
      <div class="topRight">
        <button id="themeBtn" title="Mode sombre">🌙</button>
        <button id="clearBtn" title="Vider la conversation">🗑️</button>
      </div>
    </div>

    <button id="loadMoreBtn" class="secondary" style="display:none;">Charger plus</button>

    <div id="chat"></div>

    <div id="replyPreview" style="display:none;">
      <div id="replyText"></div>
      <button id="cancelReply" title="Annuler la réponse">✕</button>
    </div>

    <div id="inputArea">
      <textarea id="messageInput" rows="1" placeholder="Écrire un message…"></textarea>

      <label for="imageInput" id="cameraLabel" title="Envoyer une photo">📷</label>
      <input id="imageInput" type="file" accept="image/*" hidden />

      <button id="sendBtn" title="Envoyer">➤</button>
    </div>
  </div>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/s/script>
  <!-- App JS -->
  <script src="script.js"></script>
</body>
</html>
