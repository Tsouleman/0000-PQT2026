
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Supabase</title>

    <!-- ✅ CSS correctement chargé -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- LOGIN -->
    <div id="login">
        <h2>Accès</h2>
        <input type="password" id="password" placeholder="Mot de passe" />
        <button onclick="login()">Entrer</button>
    </div>

    <!-- CHAT -->
    <div id="chatApp" style="display:none;">
        <div id="chatControls">
            <button onclick="clearChat()" class="danger">Vider le chat</button>
        </div>

        <div id="chat"></div>

        <div id="inputArea">
            <textarea id="messageInput" placeholder="Écrire un message..." rows="1"></textarea>

            <button id="cameraButton" type="button">📷</button>
            <input type="file" id="imageInput" accept="image/*" capture="environment" style="display:none" />

            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <!-- ✅ Charger la librairie Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ✅ Charger ton script -->
    <script src="script.js"></script>

</body>
</html>
